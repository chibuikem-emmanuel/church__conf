<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Confy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col justify-center items-center min-h-screen p-6 antialiased">

    <a href="/" class="absolute top-8 left-8 flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-indigo-600 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Home
    </a>

    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="inline-flex w-14 h-14 bg-indigo-600 rounded-2xl items-center justify-center text-white font-extrabold text-2xl mb-4 shadow-xl shadow-indigo-200 transform -rotate-3">
                C
            </div>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h2>
            <p class="text-slate-500 mt-2 font-medium tracking-tight">Access your conference management suite</p>
        </div>

        <form method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-slate-100 space-y-6">
            {% csrf_token %}
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Username</label>
                    <div class="relative group">
                        <input type="text" name="username" required
                            class="w-full bg-slate-50 border-slate-200 border-2 rounded-2xl p-4 text-slate-900 placeholder-slate-400 focus:bg-white focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 outline-none transition-all"
                            placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label class="block text-sm font-bold text-slate-700">Password</label>
                        <a href="#" class="text-xs font-bold text-indigo-600 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative group">
                        <input type="password" name="password" required
                            class="w-full bg-slate-50 border-slate-200 border-2 rounded-2xl p-4 text-slate-900 placeholder-slate-400 focus:bg-white focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 outline-none transition-all"
                            placeholder="••••••••">
                    </div>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-600 transition transform active:scale-[0.98] shadow-lg shadow-slate-200 mt-2">
                Sign In
            </button>

            <p class="text-center text-sm text-slate-500 font-medium">
                New to Confy? <a href="/register/" class="text-indigo-600 font-bold hover:underline">Create an account</a>
            </p>
        </form>

        <p class="text-center text-xs text-slate-400 mt-8 font-medium">
            &copy; 2026 Confy SaaS. Securely managed for your church.
        </p>
    </div>

</body>
</html>
