{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-8">
    <div>
        <h1 class="text-3xl font-extrabold text-slate-900">Broadcast Message</h1>
        <p class="text-slate-500 font-medium">Sending to {{ attendees.count }} people for "{{ conference.title }}"</p>
    </div>

    <div class="bg-white rounded-3xl border border-slate-100 shadow-xl overflow-hidden">
        <form id="broadcastForm" method="POST" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Subject Line</label>
                <input type="text" name="subject" required value="{{ subject|default:'' }}"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-indigo-600 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Your Message</label>
                <textarea name="message" required rows="8" 
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-indigo-600 outline-none transition">{{ message|default:'' }}</textarea>
            </div>

            <div class="flex gap-4">
                <button type="submit" id="submitBtn"
                    class="flex-1 bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-indigo-700 transition flex items-center justify-center disabled:opacity-70">
                    
                    <span id="btnText">Send Broadcast</span>

                    <span id="spinner" class="hidden">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
                <a href="{% url 'attendee_list' conference.id %}" class="px-8 py-4 text-slate-500 font-bold">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('broadcastForm');
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');

    form.addEventListener('submit', function() {
        btn.disabled = true;
        btnText.classList.add('hidden');
        spinner.classList.remove('hidden');
    });
</script>
{% endblock %}
