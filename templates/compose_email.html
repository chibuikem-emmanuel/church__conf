{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <div>
            <div class="flex items-center gap-2 text-sm font-bold text-slate-400 mb-1">
                <a href="/dashboard/" class="hover:text-indigo-600 transition">Dashboard</a>
                <span>/</span>
                <span class="text-indigo-600">Broadcast</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Email Attendees</h1>
            <p class="text-slate-500 font-medium">Updating <span class="text-indigo-600">{{ attendees.count }}</span> people for "{{ conference.title }}"</p>
        </div>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="p-4 rounded-2xl font-bold {% if message.tags == 'success' %}bg-emerald-50 text-emerald-700{% else %}bg-rose-50 text-rose-700{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="bg-white rounded-[2rem] border border-slate-100 shadow-xl shadow-slate-200/50 overflow-hidden">
        <form method="POST" class="p-8 md:p-10 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Subject Line</label>
                <input type="text" name="subject" required 
                    placeholder="e.g. Schedule Change or Welcome Message"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Your Message</label>
                <textarea name="message" required rows="10" 
                    placeholder="Write your update here..."
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 outline-none transition"></textarea>
            </div>

            <div class="pt-4 flex flex-col sm:flex-row gap-4">
                <button type="submit" 
                    class="flex-1 bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                    Send Email Now
                </button>
                <a href="/attendees/{{ conference.id }}/" 
                   class="px-8 py-4 text-slate-500 font-bold hover:bg-slate-50 rounded-2xl transition text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
